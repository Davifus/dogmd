<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogMD Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <h1>DogMD Assistant</h1>
    <div class="chat-container">
        <div id="chat-box" class="chat-box">
            <div class="message bot-msg">
                <span>Hello! I'm your veterinary assistant. Ask me anything about your dog's health.</span>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your question here..." onkeypress="handleEnter(event)">
            <button id="clear-btn" onclick="clearChat()">Clear</button>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="disclaimer">
        <p>Disclaimer: This is an independent demo project. It is not associated with Chewy, DogMD, or any official veterinary service.</p>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}-msg`;
            
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            
            bubble.innerHTML = sender === 'bot' ? marked.parse(text) : text;
            
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function clearChat() {
            chatBox.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'message bot-msg';
            div.innerHTML = '<div class="msg-bubble">Hello! I\'m your veterinary assistant. Ask me anything about your dog\'s health.</div>';
            chatBox.appendChild(div);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-msg loading';
            loadingDiv.innerText = 'Thinking...';
            chatBox.appendChild(loadingDiv);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                chatBox.removeChild(loadingDiv); 
                appendMessage(data.response, 'bot');
            } catch (error) {
                chatBox.removeChild(loadingDiv);
                appendMessage("Error connecting to server.", 'bot');
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    </script>
</body>
</html>
